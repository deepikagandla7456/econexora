name: 📝 Documentation
description: Something in the docs or README is unclear or missing?
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: textarea
    id: what
    attributes:
      label: What is missing or unclear?
      placeholder: e.g. "README doesn't mention how to add the API key."
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: What should it say?
      placeholder: e.g. "Add a step: create .env and add GEMINI_API_KEY=your_key"
    validations:
      required: false
